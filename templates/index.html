<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>News Bias Analyzer</title>
</head>
<body bgcolor="black" text="white">
    <h1 align="center">TruthAI</h1>
    <table width="100%" height="100vh" cellpadding="20" cellspacing="20">
        <tr>
            <td width="50%" valign="top">
                <form method="POST" action="/">
                    <label for="url">Article URL:</label><br><br>
                    <input type="text" id="url" name="url" size="60" placeholder="https://example.com/article" value="{% if url %}{{ url }}{% endif %}"><br><br>
                    <label for="text">Or paste article text:</label><br><br>
                    <textarea id="text" name="text" rows="25" cols="60" placeholder="Enter article text here...">{% if text %}{{ text }}{% endif %}</textarea><br><br>
                    <button type="submit">Analyze</button>
                    {% if error %}
                    <br><br>
                    <div>{{ error }}</div>
                    {% endif %}
                </form>
            </td>
            <td width="50%" valign="top">
                {% if classification %}
                <div>
                    <div><b>Classification:</b> {{ classification }}</div><br>
                    <div><b>Score:</b> {{ x }} (scale: -10 left to +10 right)</div><br>
                    <div><b>Confidence:</b> {{ confidence }}%</div><br>
                    <div><b>Model:</b> {{ model_type }}</div>
                </div>
                {% endif %}
            </td>
        </tr>
    </table>
</body>
</html>
